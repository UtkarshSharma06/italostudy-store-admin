<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CENT-S Master Theory Book: Biology | italostudy.com</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false}]});"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6366f1;
            --purple-dark: #4338ca;
            --purple-light: #eef2ff;
            --accent: #f59e0b;
            --ink: #111827;
            --muted: #4b5563;
            --line: #e5e7eb;
            --bg: #ffffff;
            --soft: #f9fafb;
        }

        @page {
            size: A4;
            margin: 20mm 15mm 25mm 15mm;
            @bottom-right {
                content: counter(page);
                font-family: 'Outfit', sans-serif;
                font-size: 9pt;
                color: var(--muted);
            }
            @bottom-left {
                content: "italostudy CEnT-S Biology Master Theory";
                font-family: 'Outfit', sans-serif;
                font-size: 8pt;
                color: var(--muted);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: "EB Garamond", serif;
            font-size: 11.5pt;
            line-height: 1.6;
            counter-reset: page 1;
        }

        h1, h2, h3, h4, .sans {
            font-family: 'Outfit', sans-serif;
            color: var(--ink);
            line-height: 1.2;
        }

        h1 { font-size: 32pt; font-weight: 800; margin-bottom: 1rem; }
        h2 { font-size: 22pt; font-weight: 700; margin-top: 2rem; color: var(--purple-dark); border-bottom: 3px solid var(--purple); padding-bottom: 0.5rem; }
        h3 { font-size: 16pt; font-weight: 600; margin-top: 1.5rem; color: var(--ink); }
        h4 { font-size: 12pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--purple); }

        p { margin: 0.8rem 0; text-align: justify; widows: 3; orphans: 3; }

        .two-column {
            column-count: 2;
            column-gap: 20pt;
            column-rule: 1px solid var(--line);
        }

        section { page-break-after: always; padding: 20mm 20mm; min-height: 100vh; }

        /* Power Cards */
        .power-card {
            background: var(--purple-light);
            border: 1px solid #c7d2fe;
            border-left: 6px solid var(--purple);
            border-radius: 8px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            break-inside: avoid;
        }

        .power-card.warning {
            background: #fff7ed;
            border-color: #ffedd5;
            border-left-color: var(--accent);
        }

        .power-card .label {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 9pt;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--purple-dark);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Pill Bars */
        .pill-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--ink);
            color: white;
            padding: 6px 16px;
            border-radius: 999px;
            font-family: 'Outfit', sans-serif;
            font-size: 9pt;
            font-weight: 600;
            margin-bottom: 1rem;
            width: fit-content;
        }

        .pill-bar .nucleus { color: var(--accent); }

        /* Worked Examples */
        .example {
            border: 2px dashed var(--line);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            background: var(--soft);
            break-inside: avoid;
        }

        .example-tag {
            background: var(--purple);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 8.5pt;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 1rem;
        }

        /* Cover & Front Matter */
        .cover {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #111827 0%, #4338ca 100%);
            color: white;
            padding: 40mm 20mm;
            position: relative;
            overflow: hidden;
        }

        .cover::before {
            content: "";
            position: absolute;
            top: -20%;
            left: -10%;
            width: 80%;
            height: 80%;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            transform: rotate(-15deg);
        }

        .cover h1 { font-size: 60pt; color: white; margin: 2rem 0; position: relative; }
        .cover h2 { border: none; color: var(--accent); font-size: 24pt; margin: 0; padding: 0; }
        .cover .brand-logo { height: 120px; filter: brightness(0) invert(1); margin-bottom: 3rem; }

        .legal-page {
            font-size: 9pt;
            color: var(--muted);
            padding: 40mm 20mm;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
        }
        
        .epigraph-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .epigraph {
            font-size: 16pt;
            font-style: italic;
            text-align: center;
            color: var(--ink);
            max-width: 600px;
        }

        .epigraph .author {
            display: block;
            margin-top: 2rem;
            font-size: 12pt;
            font-style: normal;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--purple-dark);
        }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 100pt;
            color: rgba(0,0,0,0.015);
            z-index: -1;
            pointer-events: none;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
        }

        /* Formatting for tables and math */
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 10pt; background: white; }
        th, td { border: 1px solid var(--line); padding: 10px; text-align: left; }
        th { background: var(--soft); color: var(--purple-dark); font-weight: 700; }

        .formula-box {
            text-align: center;
            padding: 1.5rem;
            background: white;
            border: 1px solid var(--line);
            border-radius: 8px;
            margin: 1rem 0;
            font-size: 1.3em;
        }

        .toc ol { list-style: none; padding: 0; }
        .toc li { display: flex; justify-content: space-between; border-bottom: 1px dotted var(--line); padding: 8px 0; align-items: baseline; }
        .toc .pg { font-weight: 700; color: var(--purple); }

        @media print {
            .no-print { display: none; }
            section { page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="watermark">italostudy.com</div>
<!-- CONTENT_INJECTION_POINT -->
</body>
</html>
